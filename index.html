<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Surprise 💖</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#ffffff;
    overflow-x:hidden;
}

/* =========================
   COUNTDOWN SCREEN
========================= */

#countdownScreen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:linear-gradient(135deg,#0f172a,#111827,#1e293b);
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:99999;
    overflow:hidden;
}

.glow{
    position:absolute;
    border-radius:50%;
    filter:blur(80px);
    opacity:0.5;
    animation:moveGlow 8s infinite alternate;
}

.glow1{
    width:300px;
    height:300px;
    background:#ff4d6d;
    top:-50px;
    left:-50px;
}

.glow2{
    width:300px;
    height:300px;
    background:#3b82f6;
    bottom:-50px;
    right:-50px;
}

@keyframes moveGlow{
    from{
        transform:translateY(0px);
    }
    to{
        transform:translateY(40px);
    }
}

.count-title{
    color:white;
    font-size:42px;
    font-weight:700;
    margin-bottom:20px;
    text-align:center;
    z-index:2;
}

#countdown{
    color:#ffcc70;
    font-size:70px;
    font-weight:bold;
    z-index:2;
    animation:pulse 1s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.08);}
    100%{transform:scale(1);}
}

.wait-text{
    margin-top:20px;
    color:#ddd;
    font-size:18px;
    letter-spacing:2px;
    z-index:2;
}

/* =========================
   NAV
========================= */

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
}

nav h2{
    font-weight:700;
    color:#ff4d6d;
}

/* =========================
   HERO
========================= */

.hero{
    height:85vh;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 60px;
}

.hero-text{
    max-width:500px;
}

.hero-text h1{
    font-size:48px;
    line-height:1.2;
}

.highlight{
    background:#ff7a00;
    color:white;
    padding:0 10px;
    border-radius:8px;
}

.pink{ color:#ff4d6d; }
.blue{ color:#3b82f6; }

.hero-text p{
    margin-top:15px;
    color:#555;
}

.btns{
    margin-top:25px;
    display:flex;
    gap:15px;
}

.btn{
    padding:12px 20px;
    border-radius:30px;
    border:none;
    cursor:pointer;
    font-weight:500;
}

.primary{
    background:#111;
    color:white;
}

.hero-side{
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
}

.side-context{
    text-align:center;
}

.side-context img{
    width:250px;
    height:420px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.side-context p{
    margin-top:10px;
    font-size:13px;
    color:#555;
}

/* =========================
   CONFETTI
========================= */

.confetti{
    position:absolute;
    width:8px;
    height:8px;
    background:orange;
    top:-10px;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh) rotate(360deg);
        opacity:0;
    }
}

/* =========================
   MOBILE
========================= */

@media(max-width:900px){

    .hero{
        flex-direction:column;
        text-align:center;
        gap:30px;
        height:auto;
        padding:40px 20px;
    }

    .hero-text h1{
        font-size:34px;
    }

    .side-context img{
        width:220px;
        height:340px;
    }

    .count-title{
        font-size:28px;
    }

    #countdown{
        font-size:42px;
    }

}

</style>
</head>

<body>

<!-- COUNTDOWN SCREEN -->

<div id="countdownScreen">

    <div class="glow glow1"></div>
    <div class="glow glow2"></div>

    <div class="count-title">
        🎂 Waiting For Your Birthday 💖
    </div>

    <div id="countdown">
        00d 00h 00m 00s
    </div>

    <div class="wait-text">
        A special surprise is loading...
    </div>

</div>

<!-- MAIN PAGE -->

<nav>
    <h2>21 HAPPY BIRTHDAY MY LOVE 💖</h2>
</nav>

<div class="hero">

    <div class="hero-text">

        <h1>
            She is not just my
            <span class="highlight">girl</span><br>

            she is
            <span class="pink">my whole</span>

            <span class="blue">
                beautiful universe
            </span> 💖
        </h1>

        <p>
            A small gift, a big smile,
            and endless memories ✨
        </p>

    </div>

    <div class="hero-side">

        <div class="side-context">
            <img src="./IMAGES/IMG_9079.jpeg">

            <p>
                ✨ The reason behind every smile
            </p>
        </div>

    </div>
    <div class="btns">
            <button class="btn primary"
            onclick="goNext()">
                🎉 Start Surprise
            </button>
        </div>

</div>

<script>

/* NEXT PAGE */

function goNext(){
    window.location.href = "timeline.html";
}

/* CONFETTI */

function createConfetti(){

    const c = document.createElement("div");

    c.classList.add("confetti");

    c.style.left = Math.random()*100 + "vw";

    c.style.background =
    ["#ff4d6d","#ffcc00","#3b82f6","#22c55e"]
    [Math.floor(Math.random()*4)];

    c.style.animationDuration =
    (Math.random()*3 + 2) + "s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),5000);
}

/* COUNTDOWN */

const targetDate =
new Date("2026-05-27T20:31:00").getTime();

const countdownScreen =
document.getElementById("countdownScreen");

const countdown =
document.getElementById("countdown");

const mainElements =
document.querySelectorAll("nav, .hero");

/* hide main page initially */

mainElements.forEach(el=>{
    el.style.display = "none";
});

const timer = setInterval(()=>{

    const now = new Date().getTime();

    const distance = targetDate - now;

    const days = Math.floor(
        distance / (1000*60*60*24)
    );

    const hours = Math.floor(
        (distance % (1000*60*60*24))
        / (1000*60*60)
    );

    const minutes = Math.floor(
        (distance % (1000*60*60))
        / (1000*60)
    );

    const seconds = Math.floor(
        (distance % (1000*60))
        / 1000
    );

    countdown.innerHTML =
    `${days}d ${hours}h ${minutes}m ${seconds}s`;

    /* birthday reached */

    if(distance < 0){

        clearInterval(timer);

        countdownScreen.style.display = "none";

        mainElements.forEach(el=>{
            el.style.display = "";
        });

        setInterval(createConfetti,150);
    }

},1000);

</script>

</body>
</html>
